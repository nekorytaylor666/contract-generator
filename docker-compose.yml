services:
  postgres:
    image: postgres:17
    container_name: contract-builder-postgres
    environment:
      POSTGRES_DB: contract-builder
      POSTGRES_USER: contract
      POSTGRES_PASSWORD: ${DB_PASSWORD:-23je9fm31mdltk4m1da90031ksla}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: contract-builder-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
